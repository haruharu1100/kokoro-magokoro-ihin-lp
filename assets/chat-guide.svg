<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">公式LINEで写真見積もり</title>
  <desc id="desc">スマートフォンのLINE相談画面と、写真見積もりの流れを表した案内画像</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbf7"/>
      <stop offset=".48" stop-color="#eef8f1"/>
      <stop offset="1" stop-color="#fff8ec"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#263b45"/>
      <stop offset="1" stop-color="#10252d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#12342c" flood-opacity=".18"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#16362f" flood-opacity=".12"/>
    </filter>
  </defs>

  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <circle cx="1010" cy="118" r="114" fill="#06c755" opacity=".1"/>
  <circle cx="142" cy="642" r="158" fill="#c9922d" opacity=".1"/>

  <g filter="url(#shadow)">
    <rect x="118" y="116" width="404" height="552" rx="46" fill="url(#phone)"/>
    <rect x="144" y="154" width="352" height="472" rx="30" fill="#fff"/>
    <rect x="249" y="132" width="142" height="16" rx="8" fill="#1c3138"/>
    <rect x="144" y="154" width="352" height="82" rx="30" fill="#06c755"/>
    <text x="176" y="205" fill="#fff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif" font-size="28" font-weight="800">公式LINE相談</text>
    <text x="176" y="229" fill="#e9fff1" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif" font-size="16" font-weight="700">@357phpan</text>

    <rect x="176" y="270" width="244" height="54" rx="18" fill="#edf3ef"/>
    <text x="198" y="304" fill="#263b45" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif" font-size="17" font-weight="700">写真を送って概算できますか？</text>

    <rect x="221" y="350" width="238" height="92" rx="20" fill="#06c755"/>
    <text x="248" y="382" fill="#fff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif" font-size="18" font-weight="800">はい、可能です。</text>
    <text x="248" y="411" fill="#f3fff6" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif" font-size="15" font-weight="700">間取り・物量・写真を</text>
    <text x="248" y="433" fill="#f3fff6" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif" font-size="15" font-weight="700">送ってください。</text>

    <rect x="176" y="472" width="132" height="104" rx="18" fill="#f8f2e6"/>
    <rect x="193" y="490" width="98" height="50" rx="10" fill="#d8eadf"/>
    <circle cx="218" cy="508" r="9" fill="#c9922d"/>
    <path d="M195 538l27-24 17 16 17-14 34 22z" fill="#4f8f75"/>
    <text x="194" y="562" fill="#32564d" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif" font-size="14" font-weight="800">室内写真</text>

    <rect x="326" y="492" width="133" height="64" rx="18" fill="#edf3ef"/>
    <text x="346" y="520" fill="#263b45" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif" font-size="15" font-weight="800">担当者が</text>
    <text x="346" y="544" fill="#263b45" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif" font-size="15" font-weight="800">確認します</text>
  </g>

  <g filter="url(#soft)">
    <rect x="576" y="128" width="492" height="128" rx="18" fill="#fff"/>
    <circle cx="626" cy="192" r="30" fill="#06c755"/>
    <path d="M613 190h26M626 177v26" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
    <text x="680" y="179" fill="#1e342f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif" font-size="27" font-weight="900">LINEで写真見積</text>
    <text x="680" y="215" fill="#5f6f6a" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif" font-size="18" font-weight="700">名前・電話番号・エリア・詳細がそのまま届きます</text>
  </g>

  <g filter="url(#soft)">
    <rect x="576" y="296" width="492" height="304" rx="22" fill="#fff"/>
    <text x="620" y="353" fill="#1e342f" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif" font-size="25" font-weight="900">送るとスムーズな内容</text>
    <g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif" font-size="20" font-weight="800">
      <circle cx="634" cy="405" r="14" fill="#06c755"/><path d="M627 405l5 5 10-12" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="666" y="413" fill="#2a4640">間取り・物量</text>
      <circle cx="634" cy="456" r="14" fill="#06c755"/><path d="M627 456l5 5 10-12" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="666" y="464" fill="#2a4640">希望時期・立ち会い可否</text>
      <circle cx="634" cy="507" r="14" fill="#06c755"/><path d="M627 507l5 5 10-12" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="666" y="515" fill="#2a4640">お部屋や荷物の写真</text>
      <circle cx="634" cy="558" r="14" fill="#06c755"/><path d="M627 558l5 5 10-12" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><text x="666" y="566" fill="#2a4640">担当者が内容を確認して返信</text>
    </g>
  </g>

  <rect x="730" y="632" width="194" height="52" rx="26" fill="#06c755"/>
  <text x="827" y="666" text-anchor="middle" fill="#fff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif" font-size="20" font-weight="900">公式LINEへ</text>
  <text x="944" y="666" fill="#2c4941" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Noto Sans JP', sans-serif" font-size="18" font-weight="800">9:00〜18:00 / 0745-51-1665</text>
</svg>
